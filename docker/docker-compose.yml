# Default stack uses MinIO (S3-compatible) for BookFile/covers storage.
# To use local disk instead: set STORAGE_TYPE=local, STORAGE_PATH=/data/library,
# remove S3_* env vars, drop minio/minio-init from depends_on, and mount library_data + shelf_covers.
services:
  shelf:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://shelf:password@db:5432/shelf
      - NEXTAUTH_URL=http://localhost:3000
      # Required in production: Auth.js refuses requests when trustHost is false (no VERCEL/CF_PAGES in Docker).
      - AUTH_TRUST_HOST=true
      # Min 32 chars required in production (see validateServerEnv); replace in real deployments.
      - NEXTAUTH_SECRET=change-me-replace-with-openssl-rand-hex-32
      - REGISTRATION_ENABLED=true
      - STORAGE_TYPE=s3
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=shelf
      # Must match MINIO_ROOT_USER / MINIO_ROOT_PASSWORD on the minio service; replace in production.
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_REGION=us-east-1
      - OPENLIBRARY_RATE_LIMIT=1
      - APP_NAME=Shelf
      - DEFAULT_LOCALE=fr
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shelf
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shelf
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shelf"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      # Replace in production with strong credentials.
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb local/shelf --ignore-existing
    restart: "no"

volumes:
  minio_data:
  pg_data:
  redis_data:
